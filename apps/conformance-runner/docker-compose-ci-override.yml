# Layered on top of the upstream docker-compose-dev-mac.yml when starting the
# OIDF conformance suite on Linux CI runners. Docker Desktop on Mac auto-
# populates host.docker.internal in containers' /etc/hosts; Linux Docker does
# not, so without this override the suite's server container fails every
# discovery fetch with "host.docker.internal: Name or service not known".
# host-gateway is a Docker magic value that resolves to the container's host
# gateway, letting the suite reach the auth-server bound to 0.0.0.0:3000 on
# the runner.
services:
  server:
    extra_hosts:
      - "host.docker.internal:host-gateway"
